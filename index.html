<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halısaha Takım Oluşturucu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-shell">
<div class="mobile-frame">

<header class="hero">
<div>
<h1>Halısaha Takım</h1>
<p>Kadroyu oluştur, aktifleri seç, dengeli takımları çıkar.</p>
</div>
</header>

<section class="card">
<div class="section-head">
<h2>Oyuncu Ekle / Düzenle</h2>
</div>

<form id="playerForm">

<input type="hidden" id="editIndex" value="-1">

<div class="grid form-grid">

<div class="field">
<label>Oyuncu adı</label>
<input type="text" id="name" required>
</div>

<div class="field">
<label>Pozisyon</label>
<select id="position">
<option value="">Pozisyon seç</option>
<option value="Kaleci">Kaleci</option>
<option value="Defans">Defans</option>
<option value="Orta Saha">Orta Saha</option>
<option value="Forvet">Forvet</option>
</select>
</div>

<div class="field">
<label>Genel güç</label>
<input type="number" id="overall" min="1" max="10">
</div>

<div class="field">
<label>Şut</label>
<input type="number" id="shot" min="1" max="10">
</div>

<div class="field">
<label>Defans</label>
<input type="number" id="defense" min="1" max="10">
</div>

<div class="field">
<label>Pas</label>
<input type="number" id="pass" min="1" max="10">
</div>

<div class="field">
<label>Hız</label>
<input type="number" id="speed" min="1" max="10">
</div>

<div class="field">
<label>Dayanıklılık</label>
<input type="number" id="stamina" min="1" max="10">
</div>

</div>

<div class="button-group top-space">
<button type="submit">Kaydet</button>
</div>

</form>
</section>

<section class="card">
<div class="section-head">
<h2>Oyuncular</h2>
</div>

<div id="playersList"></div>

</section>

</div>
</div>


<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6xJCfrjk3RQ5vWAoDVBP5nhaDSTUw-F0",
authDomain: "emre-tkmolustr.firebaseapp.com",
projectId: "emre-tkmolustr",
storageBucket: "emre-tkmolustr.firebasestorage.app",
messagingSenderId: "465918251433",
appId: "1:465918251433:web:41d61ae613b224353934b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("playerForm");
const list = document.getElementById("playersList");


async function loadPlayers(){

list.innerHTML = "";

const querySnapshot = await getDocs(collection(db,"players"));

querySnapshot.forEach((doc)=>{

const player = doc.data();

const div = document.createElement("div");

div.innerHTML = `
<div class="player-card">
<strong>${player.name}</strong>
<span>${player.position}</span>
</div>
`;

list.appendChild(div);

});

}


form.addEventListener("submit", async (e)=>{

e.preventDefault();

const name = document.getElementById("name").value;
const position = document.getElementById("position").value;

await addDoc(collection(db,"players"),{
name:name,
position:position
});

form.reset();

loadPlayers();

});


loadPlayers();

</script>

</body>
</html>
<script type="module" src="app.js"></script>
